<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>¡Compra exitosa! – STAC</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg-deep: #040D1A;
      --bg-card: #071528;
      --bg-surface: #0C1E3A;
      --blue-core: #005FFF;
      --blue-glow: #00AAFF;
      --accent-red: #FF3E3E;
      --text-primary: #E8F1FF;
      --text-body: #9DB8D8;
      --text-dim: #4A6A90;
      --accent-green: #00E5B0;
      --border: rgba(0,95,255,0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-deep);
      color: var(--text-body);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      max-width: 560px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 60px rgba(0,95,255,0.12);
    }
    .card-header {
      background: linear-gradient(135deg, var(--accent-red) 0%, var(--blue-core) 100%);
      text-align: center;
      padding: 32px 32px 28px;
    }
    .card-header img { height: 88px; display: block; margin: 0 auto 6px; }
    .card-header .brand-tag {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: #fff; opacity: 0.9; margin-bottom: 16px;
    }
    .card-header .badge {
      display: inline-block;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 24px;
      padding: 9px 22px;
      font-size: 15px; font-weight: 700; color: #fff;
    }
    .card-body { padding: 32px 36px 36px; }
    h1 {
      font-family: 'Rajdhani', sans-serif;
      color: var(--text-primary);
      font-size: 22px;
      text-align: center;
      margin-bottom: 8px;
    }
    .sub {
      text-align: center;
      color: var(--text-body);
      font-size: 14px;
      margin-bottom: 4px;
    }
    .email-note {
      text-align: center;
      color: var(--accent-green);
      font-size: 13.5px;
      margin: 16px 0 24px;
      background: rgba(0,229,176,0.08);
      border: 1px solid rgba(0,229,176,0.25);
      border-radius: 10px;
      padding: 12px 16px;
    }
    #items-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 280px;
      overflow-y: auto;
      margin-bottom: 18px;
    }
    .item-row {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .item-img {
      width: 56px; height: 56px; flex-shrink: 0;
      border-radius: 8px; overflow: hidden;
      background: var(--bg-deep);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .item-img img { width: 100%; height: 100%; object-fit: cover; }
    .item-name { font-size: 13px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-qty { font-size: 12px; color: var(--text-dim); }
    .item-total { font-size: 13.5px; font-weight: 700; color: var(--blue-glow); white-space: nowrap; }
    .totals {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 13.5px;
      margin-bottom: 24px;
    }
    .totals .row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .totals .final { padding-top: 10px; border-top: 1px solid var(--border); font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .totals .final span:last-child { color: var(--accent-green); }
    .btn {
      display: block;
      width: 100%;
      text-align: center;
      background: var(--blue-glow);
      color: #001b33;
      font-weight: 700;
      font-size: 15px;
      padding: 13px;
      border-radius: 10px;
      text-decoration: none;
    }
    #loading { text-align: center; padding: 20px 0; color: var(--text-dim); }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <img src="favicon.png" alt="STAC" />
      <div class="brand-tag">Soporte Técnico Avanzado en Computación</div>
      <span class="badge">✅ ¡Pago confirmado!</span>
    </div>
    <div class="card-body">
      <h1>¡Gracias por tu compra!</h1>
      <p class="sub">Tu pago fue procesado exitosamente.</p>
      <div class="email-note">📧 Revisa tu correo electrónico — te enviamos el ticket de compra con el desglose de IVA.</div>

      <div id="loading">Cargando el detalle de tu pedido...</div>
      <div id="items-list" style="display:none;"></div>
      <div id="totals" style="display:none;"></div>

      <a href="index.html" class="btn">Volver a la tienda</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://limxmsfsasyrcpnpjgqo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_OVmFpr180IcEXmIppIWT2A_TY1Wq4Zd';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }

    (async function () {
      const params = new URLSearchParams(location.search);
      const orderId = params.get('order');
      const loading = document.getElementById('loading');
      const itemsList = document.getElementById('items-list');
      const totalsEl = document.getElementById('totals');

      if (!orderId) {
        loading.textContent = 'Gracias por tu compra.';
        return;
      }

      try {
        const { data: order, error } = await sb
          .from('orders')
          .select('id, total, order_items(name, price, quantity, product_id)')
          .eq('id', orderId)
          .single();

        if (error || !order) {
          loading.textContent = 'Gracias por tu compra. El detalle llegará a tu correo.';
          return;
        }

        const productIds = order.order_items.map(i => i.product_id).filter(Boolean);
        let imgMap = {};
        if (productIds.length) {
          const { data: prods } = await sb.from('products').select('id, images').in('id', productIds);
          (prods || []).forEach(p => { imgMap[p.id] = (p.images && p.images[0]) || ''; });
        }

        itemsList.innerHTML = order.order_items.map(it => {
          const img = imgMap[it.product_id] || '';
          return `
            <div class="item-row">
              <div class="item-img">${img ? `<img src="${escapeHtml(img)}">` : '📦'}</div>
              <div style="flex:1; min-width:0;">
                <div class="item-name">${escapeHtml(it.name)}</div>
                <div class="item-qty">Cant. ${it.quantity} × $${Number(it.price).toLocaleString('es-MX')}</div>
              </div>
              <div class="item-total">$${(it.price * it.quantity).toLocaleString('es-MX', { maximumFractionDigits: 0 })}</div>
            </div>`;
        }).join('');

        const subtotal = order.total / 1.16;
        const iva = order.total - subtotal;
        totalsEl.innerHTML = `
          <div class="totals">
            <div class="row"><span>Subtotal (sin IVA)</span><span>$${subtotal.toLocaleString('es-MX', { maximumFractionDigits: 2 })}</span></div>
            <div class="row"><span>IVA (16%)</span><span>$${iva.toLocaleString('es-MX', { maximumFractionDigits: 2 })}</span></div>
            <div class="row final"><span>Total pagado</span><span>$${Number(order.total).toLocaleString('es-MX', { maximumFractionDigits: 2 })}</span></div>
          </div>`;

        loading.style.display = 'none';
        itemsList.style.display = 'flex';
        totalsEl.style.display = 'block';
      } catch (e) {
        loading.textContent = 'Gracias por tu compra. El detalle llegará a tu correo.';
      }
    })();
  </script>
</body>
</html>
