name: Desplegar funciones de Supabase

on:
  workflow_dispatch:   # manual: córrelo cuando cambien las funciones (ai-generate)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Desplegar ai-generate
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy ai-generate --project-ref limxmsfsasyrcpnpjgqo

      - name: Desplegar create-checkout-session
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy create-checkout-session --project-ref limxmsfsasyrcpnpjgqo

      - name: Desplegar stripe-webhook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy stripe-webhook --project-ref limxmsfsasyrcpnpjgqo --no-verify-jwt

      - name: Desplegar password-reset
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy password-reset --project-ref limxmsfsasyrcpnpjgqo --no-verify-jwt

      - name: Desplegar trigger-precios-scraper
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy trigger-precios-scraper --project-ref limxmsfsasyrcpnpjgqo
